openapi: 3.0.3
info:
  title: eSIM Profile Management Subscriptions API
  description: |
    CAMARA eSIM Profile Management Subscriptions API v0.1 - Event subscription management for eSIM Profile operations

    # Introduction

    This API provides event subscription capabilities for eSIM Profile Management operations. API consumers can subscribe to receive notifications when eSIM Profile operations complete (download, enable, disable, delete, set-fallback).

    The API follows CAMARA CloudEvents-based subscription model for event notifications.

    **Key roles**

    | **Role Name** | **Description** |
    | ---- | ------- |
    | API Consumer | The entity that subscribes to eSIM Profile operation events |
    | API Provider | The entity that provides the event subscription service |
    | Network Provider | The entity that manages eSIM Profile operations and generates events |

    # Event Types

    This API supports subscription to the following event types:

    - `org.camaraproject.esim-profile-management.v0.operation-completed` - Triggered when any eSIM Profile operation completes (success or failure)

    # Subscription Model

    Subscriptions are managed as resources with full CRUD operations:
    - **POST /subscriptions** - Create a new event subscription
    - **GET /subscriptions** - List all subscriptions
    - **GET /subscriptions/{subscriptionId}** - Retrieve a specific subscription
    - **DELETE /subscriptions/{subscriptionId}** - Delete a subscription

    # Event Notification

    When a subscribed event occurs, a CloudEvents-formatted notification is sent to the configured sink URL via HTTP POST.

