openapi: 3.0.3
info:
  title: eSIM Profile Management API
  description: |
    CAMARA eSIM Profile Management API v0.1 - Developer-friendly eSIM Profile APIs

    # Introduction

    eSIM (embedded SIM) technology allows remote provisioning and management of cellular connectivity without physical SIM card replacement. The CAMARA eSIM Profile Management API provides a unified interface for eSIM Profile lifecycle operations including download, enable, disable, delete, and fallback configuration.

    The target of the eSIM Profile operations is typically the eUICC on the device (as opposed to the cellular network).

    **Terminology Note**: In this API, "eSIM Profile" refers to downloadable connectivity configurations installed on eSIM hardware (eUICC). "eSIM" refers to the hardware itself.

    **Key roles**

    | **Role Name** | **Description** |
    | ---- | ------- |
    | API Consumer | The entity that consumes the eSIM Profile Management APIs |
    | API Provider | The entity that provides the eSIM Profile Management APIs |
    | Network Provider | The entity that provides the physical network resources and eSIM Profile platform |
    | Device Owner | The entity that owns or manages the devices containing eSIM hardware |

    ## Operation-Specific Identification

    - **Download**: Requires both EID (target device) and ICCID (profile to install)
    - **Enable/Disable/Delete**: Requires only ICCID
    - **Set-Fallback**: Requires only ICCID
    - **Status**: Accepts either EID (all profiles on device) or ICCID (specific profile)

    # Operation Lifecycle

    1. **Download**: Install eSIM profile to device. Optionally enable immediately.
    2. **Enable**: Enable downloaded eSIM for connectivity (only one active per device)
    3. **Disable**: Disable eSIM (device loses connectivity, eSIM remains installed)
    4. **Delete**: Permanently remove eSIM from device (irreversible)
    5. **Set-Fallback**: Configure backup eSIM for automatic failover

    # States of eSIMs

    eSIMs have two states: DISABLED and ENABLED.

    - DISABLED: eSIM installed but not active
    - ENABLED: eSIM active and providing connectivity
    - Only one eSIM can be enabled per device (per eUICC on the device)
    - Deletion permanently removes the eSIM

    # Pre-requisites

    Before using the eSIM Management API, agreements must be in place between the API Consumer and API Provider covering:

    - Service plans and connectivity options
    - Geographic coverage areas
    - Device compatibility requirements
    - Terms and conditions including pricing

    This preparation phase is **outside the scope** of the eSIM Management API.


